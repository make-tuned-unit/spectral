# Spectral benchmark queries
#
# 30 curated queries covering six patterns:
#   - single_word   (5) — single-token entity or concept lookups
#   - multi_word    (5) — multi-token phrase queries
#   - concept       (5) — abstract concept anchors
#   - temporal      (5) — time-reference queries
#   - cross_domain  (5) — terms spanning multiple wings
#   - adversarial   (5) — terms expected to match few or no results
#
# expected_keywords: at least one must appear (case-insensitive substring)
# in the content of any top-N result for the accuracy check to pass.

# ── Single-word entity lookups ──────────────────────────────────────

[[queries]]
name = "single_word_agent"
text = "agent"
description = "Single-word lookup for agent-related memories"
expected_keywords = ["agent"]
expected_top_n = 5
latency_budget_p95_ms = 5.0
latency_budget_p99_ms = 10.0
visibility = "private"

