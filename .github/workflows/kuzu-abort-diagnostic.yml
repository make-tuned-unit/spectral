name: Kuzu abort diagnostic
on:
  workflow_dispatch:

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: docs/kuzu-linux-teardown
      - uses: dtolnay/rust-toolchain@stable
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            /usr/local/lib/android /usr/local/share/boost \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
      - name: Run diagnostic test (single brain)
        run: |
          cargo test -p spectral-graph -- --ignored --nocapture \
            kuzu_schema_abort_repro 2>&1 \
            | tee /tmp/spectral-schema-abort.log
      - name: Run all spectral-graph tests (multi-brain abort repro)
        if: always()
        run: |
          cargo test -p spectral-graph -- --nocapture 2>&1 \
            | tee /tmp/spectral-full-test.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spectral-diagnostic-logs
          path: |
            /tmp/spectral-schema-abort.log
            /tmp/spectral-full-test.log
