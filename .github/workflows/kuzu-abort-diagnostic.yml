# Kuzu abort diagnostic (manual).
#
# Co-located with the diagnostic reproducer tests on the
# `docs/kuzu-linux-teardown` branch so the whole probe is self-contained and
# runnable in one shot. Dispatch against this branch, e.g.:
#
#     gh workflow run kuzu-abort-diagnostic.yml --ref docs/kuzu-linux-teardown
#
# NOTE: a copy of this workflow also exists on `main`. Keep them in sync or
# prune one once issue #153 is resolved.
name: Kuzu abort diagnostic
on:
  workflow_dispatch:

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: docs/kuzu-linux-teardown
      - uses: dtolnay/rust-toolchain@stable
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            /usr/local/lib/android /usr/local/share/boost \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
      # Each reproducer runs in its OWN `cargo test` process so a SIGABRT in
      # one cannot mask the result of another. Filters are exact test names
      # (both tests live in module `kuzu_schema_abort_repro`).
      - name: Run diagnostic test (single brain)
        run: |
          cargo test -p spectral-graph -- --ignored --nocapture \
            single_brain_open_aborts_on_linux 2>&1 \
            | tee /tmp/spectral-schema-abort.log
      - name: Run N-brain co-residence repro (federation topology + #153)
        if: always()
        run: |
          cargo test -p spectral-graph -- --ignored --nocapture \
            n_brains_coresident_recall_varied_drop_order 2>&1 \
            | tee /tmp/spectral-nbrain-abort.log
      - name: Run all spectral-graph tests (multi-brain abort repro)
        if: always()
        run: |
          cargo test -p spectral-graph -- --nocapture 2>&1 \
            | tee /tmp/spectral-full-test.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spectral-diagnostic-logs
          path: |
            /tmp/spectral-schema-abort.log
            /tmp/spectral-nbrain-abort.log
            /tmp/spectral-full-test.log
