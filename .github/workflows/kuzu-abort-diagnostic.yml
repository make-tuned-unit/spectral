name: Kuzu abort diagnostic
on:
  workflow_dispatch:

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/kuzu-linux-teardown
      - uses: dtolnay/rust-toolchain@stable
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
            /usr/local/lib/android /usr/local/share/boost \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
      - name: Run diagnostic test
        run: |
          cargo test -p spectral-graph -- --ignored \
            kuzu_schema_abort_repro 2>&1 \
            | tee /tmp/spectral-schema-abort.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spectral-schema-abort-log
          path: /tmp/spectral-schema-abort.log
