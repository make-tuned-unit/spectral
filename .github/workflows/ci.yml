name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Free runner disk
        if: runner.os == 'Linux'
        run: |
          echo "=== Before ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/.ghcup || true
          if command -v docker &>/dev/null; then docker system prune -af || true; fi
          echo "=== After ==="
          df -h /
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Fix macOS cargo PATH
        if: runner.os == 'macOS'
        run: |
          # On macos-15 runners, the system cargo in /opt/homebrew/bin resolves
          # to rustup-init instead of a proper proxy. Prepend the real toolchain
          # bin directory so cargo/rustc resolve correctly.
          REAL_CARGO_DIR="$(dirname "$(rustup which cargo)")"
          echo "$REAL_CARGO_DIR" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - name: Unit and integration tests
        run: cargo test --workspace --lib --tests
      - name: Doc tests
        run: cargo test --workspace --doc

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free runner disk
        run: |
          echo "=== Before ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/.ghcup || true
          if command -v docker &>/dev/null; then docker system prune -af || true; fi
          echo "=== After ==="
          df -h /
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (default features)
        run: cargo build -p spectral
      - name: Build (no default features)
        run: cargo build -p spectral --no-default-features
